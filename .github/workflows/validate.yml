name: Validate

on:
  pull_request:
    paths:
      - "data/**"
      - "rank_models.py"
      - "Makefile"
      - "plots.sh"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "rank_models.py"
      - "Makefile"
      - "plots.sh"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas ruff

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Smoke-test website data export
        run: make check-ranking-data
