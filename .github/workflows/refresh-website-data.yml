name: Refresh website data

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "rank_models.py"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-website-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install export dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas

      - name: Refresh website JSON
        run: make refresh-ranking-data

      - name: Commit updated website data
        run: |
          if [[ -z "$(git status --porcelain -- docs/data)" ]]; then
            echo "docs/data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Auto-refresh website data"
          git push
